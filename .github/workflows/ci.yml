name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # R-W1: 编译 + 测试 (Linux + Windows matrix)
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p agent-core -p agent-bindings
      - run: cargo test -p agent-core --lib
      # R-W1: Windows 额外验证 — C API 编译 + dotnet 检测
      - if: matrix.os == 'windows-latest'
        run: cargo build -p agent-bindings --features cli

  # ── 交叉编译：Android ARM64 ──
  cross-android:
    name: Android (ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27
      - run: cargo build -p agent-core --target aarch64-linux-android --no-default-features
        env:
          CC_aarch64_linux_android: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          AR_aarch64_linux_android: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar

